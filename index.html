<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NPM Inspection">
<title>NPM Property Inspection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #142878;
  --navy-dark: #0d1d52;
  --sky: #00A0DC;
  --sky-light: #e6f6fd;
  --gray-50: #F7F8FC;
  --gray-100: #EEF1F8;
  --gray-200: #DDE3F0;
  --gray-400: #9AA3BA;
  --gray-600: #5A6482;
  --gray-900: #1A2340;
  --green: #0f7b4e;
  --green-bg: #e7f6ef;
  --amber: #b45309;
  --amber-bg: #fef3c7;
  --red: #b91c1c;
  --red-bg: #fee2e2;
  --sidebar-w: 280px;
  --header-h: 64px;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(20,40,120,0.08);
  --touch: 48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  font-size: 16px;
}

/* ── LAYOUT ─────────────────────────────────────── */
#app { display: flex; height: 100dvh; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

#sidebar-brand {
  padding: 20px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
#sidebar-brand .sub {
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sky);
  font-weight: 700;
  margin-bottom: 3px;
}
#sidebar-brand .title {
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
}

/* Overall progress */
#overall-progress {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.prog-bar-track {
  background: rgba(255,255,255,0.12);
  border-radius: 99px;
  height: 6px;
  margin-bottom: 8px;
}
.prog-bar-fill {
  background: var(--sky);
  height: 6px;
  border-radius: 99px;
  transition: width 0.4s ease;
}
.prog-stats {
  display: flex;
  gap: 12px;
  font-size: 11px;
  font-family: 'Sora', sans-serif;
}
.prog-stats span { color: rgba(255,255,255,0.5); }
.prog-stats .s-pass { color: #6ee7b7; }
.prog-stats .s-flag { color: #fcd34d; }
.prog-stats .s-fail { color: #fca5a5; }

/* Nav list */
#nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  -webkit-overflow-scrolling: touch;
}
#nav-list::-webkit-scrollbar { width: 4px; }
#nav-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s, border-color 0.15s;
  min-height: var(--touch);
  user-select: none;
  -webkit-user-select: none;
}
.nav-item:active { background: rgba(255,255,255,0.05); }
.nav-item.active {
  background: rgba(0,160,220,0.18);
  border-left-color: var(--sky);
}
.nav-item .nav-icon { font-size: 18px; flex-shrink: 0; }
.nav-item .nav-label {
  flex: 1;
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  line-height: 1.3;
}
.nav-item.active .nav-label { color: #fff; }
.nav-item .nav-count {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  font-family: 'Sora', sans-serif;
  flex-shrink: 0;
}
.nav-item .nav-badges { display: flex; gap: 4px; flex-shrink: 0; }
.nav-badge {
  font-size: 10px;
  font-weight: 700;
  font-family: 'Sora', sans-serif;
  border-radius: 99px;
  padding: 1px 6px;
}
.nav-badge.fail { background: var(--red-bg); color: var(--red); }
.nav-badge.flag { background: var(--amber-bg); color: var(--amber); }

/* Sidebar footer */
#sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
#btn-print {
  width: 100%;
  background: var(--sky);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  min-height: var(--touch);
}
#btn-print:active { opacity: 0.85; }

/* MAIN CONTENT */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Section header bar */
#section-header {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  height: var(--header-h);
  flex-shrink: 0;
}
#section-header .sec-icon { font-size: 24px; }
#section-header .sec-title {
  font-family: 'Sora', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--navy);
}
#section-header .sec-sub {
  font-size: 13px;
  color: var(--gray-400);
  margin-left: 4px;
}
#section-header .sec-badges { display: flex; gap: 6px; margin-left: auto; }
.sec-badge {
  font-size: 12px;
  font-weight: 700;
  font-family: 'Sora', sans-serif;
  border-radius: 99px;
  padding: 4px 12px;
}
.sec-badge.fail { background: var(--red-bg); color: var(--red); }
.sec-badge.flag { background: var(--amber-bg); color: var(--amber); }

/* Scrollable content area */
#content-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 28px 40px;
}
#content-scroll::-webkit-scrollbar { width: 6px; }
#content-scroll::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

/* ── PROPERTY INFO PANEL ─────────────────── */
#prop-panel { display: flex; flex-direction: column; gap: 16px; }

.info-card {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  padding: 20px 22px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: 'Sora', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sky);
  margin-bottom: 16px;
}
.field-grid {
  display: grid;
  gap: 14px 20px;
}
.field-grid.cols2 { grid-template-columns: 1fr 1fr; }
.field-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.field-full { grid-column: 1 / -1; }

.field label {
  display: block;
  font-family: 'Sora', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray-400);
  margin-bottom: 6px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--gray-900);
  background: var(--gray-50);
  outline: none;
  transition: border-color 0.15s;
  min-height: var(--touch);
  -webkit-appearance: none;
}
.field input:focus, .field textarea:focus {
  border-color: var(--sky);
  background: #fff;
}
.field textarea { min-height: 80px; resize: vertical; }

/* ── CHECKLIST PANEL ─────────────────── */
#check-panel { display: flex; flex-direction: column; gap: 12px; }

.check-item {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, background 0.15s;
}
.check-item.status-fail { border-color: #fca5a5; background: #fff8f8; }
.check-item.status-flag { border-color: #fcd34d; background: #fffdf0; }
.check-item.status-pass { border-color: #86efac; }

.check-top {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  flex-wrap: wrap;
}
.check-label {
  flex: 1;
  font-size: 15px;
  color: var(--gray-900);
  line-height: 1.45;
  min-width: 200px;
  padding-top: 10px;
}
.appliance-badge {
  display: inline-block;
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  background: #e8efff;
  color: var(--navy);
  border-radius: 4px;
  padding: 2px 7px;
  margin-left: 8px;
  vertical-align: middle;
}

/* Status buttons */
.status-btns {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.status-btn {
  min-height: var(--touch);
  padding: 0 16px;
  border-radius: 10px;
  border: 1.5px solid var(--gray-200);
  background: #fff;
  color: var(--gray-400);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  -webkit-appearance: none;
}
.status-btn:active { transform: scale(0.95); }
.status-btn.active-pass { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.status-btn.active-flag { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); }
.status-btn.active-fail { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.status-btn.active-na { border-color: var(--gray-400); background: var(--gray-100); color: var(--gray-600); }

/* Item note */
.item-note {
  margin-top: 10px;
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--gray-900);
  background: var(--gray-50);
  outline: none;
  min-height: 44px;
}
.item-note:focus { border-color: var(--sky); background: #fff; }

/* Appliance fields */
.appliance-fields {
  margin-top: 12px;
  padding: 14px 16px;
  background: var(--gray-50);
  border-radius: 10px;
  border: 1px solid var(--gray-200);
}
.appliance-fields-title {
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sky);
  margin-bottom: 10px;
}
.appliance-fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px 14px;
}

/* Section comment box */
.section-comment-box {
  background: #fff;
  border-radius: var(--radius);
  border: 1.5px dashed var(--gray-200);
  padding: 16px 18px;
}
.section-comment-box label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Sora', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--navy);
  margin-bottom: 10px;
}
.section-comment-box textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--gray-900);
  background: var(--gray-50);
  outline: none;
  min-height: 80px;
  resize: vertical;
  transition: border-color 0.15s;
}
.section-comment-box textarea:focus { border-color: var(--sky); background: #fff; }

/* ── SUMMARY PANEL ─────────────────── */
#summary-panel { display: flex; flex-direction: column; gap: 16px; }

.summary-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.stat-card {
  background: var(--navy);
  border-radius: var(--radius);
  padding: 18px 14px;
  text-align: center;
}
.stat-val {
  font-family: 'Sora', sans-serif;
  font-size: 36px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.5);
}
.stat-card.s-total .stat-val { color: #fff; }
.stat-card.s-pass  .stat-val { color: #6ee7b7; }
.stat-card.s-flag  .stat-val { color: #fcd34d; }
.stat-card.s-fail  .stat-val { color: #fca5a5; }

/* Section summary rows */
.summary-section-row {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.ssr-icon { font-size: 20px; }
.ssr-label { flex: 1; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; color: var(--navy); }
.ssr-prog { display: flex; align-items: center; gap: 10px; }
.ssr-bar-track { width: 100px; height: 5px; background: var(--gray-100); border-radius: 99px; }
.ssr-bar-fill { height: 5px; background: var(--sky); border-radius: 99px; transition: width 0.3s; }
.ssr-count { font-family: 'Sora', sans-serif; font-size: 11px; color: var(--gray-400); min-width: 36px; text-align: right; }
.ssr-badges { display: flex; gap: 5px; }

/* ── PRINT ────────────────────────── */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  #app { display: none !important; }
  #print-view { display: block !important; }
}

/* Print view (hidden on screen) */
#print-view {
  display: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: #1A2340;
  padding: 24px;
  max-width: 900px;
  margin: 0 auto;
}
.pv-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 3px solid #142878;
  padding-bottom: 12px;
  margin-bottom: 18px;
}
.pv-header-left .pv-co {
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #00A0DC;
  margin-bottom: 3px;
}
.pv-header-left .pv-title {
  font-family: 'Sora', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: #142878;
}
.pv-header-right {
  text-align: right;
  font-size: 11px;
  color: #5A6482;
  line-height: 1.8;
}
.pv-prop-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px 20px;
  background: #F7F8FC;
  border: 1px solid #DDE3F0;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 20px;
}
.pv-prop-field label {
  display: block;
  font-family: 'Sora', sans-serif;
  font-size: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #9AA3BA;
  margin-bottom: 2px;
}
.pv-prop-field .pv-val {
  font-size: 13px;
  font-weight: 600;
  color: #1A2340;
}
.pv-section { margin-bottom: 22px; page-break-inside: avoid; }
.pv-section-title {
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  background: #142878;
  padding: 7px 12px;
  border-radius: 6px 6px 0 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pv-items { border: 1px solid #DDE3F0; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
.pv-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 12px;
  border-bottom: 1px solid #EEF1F8;
  font-size: 11px;
}
.pv-item:last-child { border-bottom: none; }
.pv-item.pv-fail { background: #fff8f8; }
.pv-item.pv-flag { background: #fffdf0; }
.pv-item.pv-pass { background: #f4fdf8; }
.pv-item-label { flex: 1; line-height: 1.4; padding-top: 1px; }
.pv-status {
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  flex-shrink: 0;
}
.pv-status.pass { background: #e7f6ef; color: #0f7b4e; }
.pv-status.flag { background: #fef3c7; color: #b45309; }
.pv-status.fail { background: #fee2e2; color: #b91c1c; }
.pv-status.na   { background: #EEF1F8; color: #9AA3BA; }
.pv-status.none { background: #EEF1F8; color: #9AA3BA; }
.pv-item-note {
  font-size: 10px;
  color: #5A6482;
  font-style: italic;
  margin-top: 2px;
}
.pv-app-fields {
  font-size: 10px;
  color: #5A6482;
  margin-top: 2px;
}
.pv-sec-comment {
  padding: 6px 12px;
  background: #F7F8FC;
  border-top: 1px dashed #DDE3F0;
  font-size: 10px;
  color: #5A6482;
  font-style: italic;
}
.pv-summary {
  background: #142878;
  color: #fff;
  border-radius: 8px;
  padding: 16px 18px;
  margin-bottom: 20px;
}
.pv-summary-title {
  font-family: 'Sora', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #00A0DC;
  margin-bottom: 12px;
}
.pv-summary-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.pv-stat { text-align: center; }
.pv-stat-val { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; }
.pv-stat-label { font-size: 9px; color: rgba(255,255,255,0.5); font-family: 'Sora', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
.pv-stat.s-pass .pv-stat-val { color: #6ee7b7; }
.pv-stat.s-flag .pv-stat-val { color: #fcd34d; }
.pv-stat.s-fail .pv-stat-val { color: #fca5a5; }
.pv-rec-label { font-family: 'Sora', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
.pv-rec-text { font-size: 11px; color: rgba(255,255,255,0.9); line-height: 1.6; white-space: pre-wrap; }
.pv-sig {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid #DDE3F0;
}
.pv-sig-block { border-top: 1px solid #1A2340; padding-top: 6px; }
.pv-sig-label { font-family: 'Sora', sans-serif; font-size: 9px; color: #9AA3BA; text-transform: uppercase; letter-spacing: 1px; }
.pv-addr-full { grid-column: 1 / -1; }

/* ── UTILITY ─────────────────────── */
.hidden { display: none !important; }
input::placeholder, textarea::placeholder { color: var(--gray-400); }
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-brand">
      <div class="sub">Newera Property Management</div>
      <div class="title">Property Walkthrough<br>Checklist</div>
    </div>

    <div id="overall-progress">
      <div class="prog-bar-track"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-stats">
        <span id="prog-text">0 / 0 reviewed</span>
        <span class="s-pass" id="prog-pass">✓ 0</span>
        <span class="s-flag" id="prog-flag">⚠ 0</span>
        <span class="s-fail" id="prog-fail">✗ 0</span>
      </div>
    </div>

    <div id="nav-list">
      <div class="nav-item active" data-section="property" onclick="showSection('property')">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">Property Info</span>
      </div>
      <!-- Section nav items injected by JS -->
    </div>

    <div id="sidebar-footer">
      <button id="btn-print" onclick="printAll()">🖨&nbsp; Print / Save PDF</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="section-header">
      <span class="sec-icon" id="hdr-icon">🏢</span>
      <span class="sec-title" id="hdr-title">Property Information</span>
      <span class="sec-sub" id="hdr-sub"></span>
      <div class="sec-badges" id="hdr-badges"></div>
    </div>

    <div id="content-scroll">

// ─── STATE ────────────────────────────────────────────────────────────────────
const STATE_KEY = 'npm_checklist_v1';
let state = loadState();

function defaultState() {
  return {
    prop: { address:'', owner:'', yearBuilt:'', beds:'', baths:'', date:'', inspector:'' },
    checks: {},      // "sectionId__idx" -> "pass"|"flag"|"fail"|"na"
    notes: {},       // "sectionId__idx" -> string
    appliance: {},   // "sectionId__idx__field" -> string
    sectionComments:{}, // sectionId -> string
    summary: '',
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return { ...defaultState(), ...JSON.parse(raw) };
  } catch(e) {}
  return defaultState();
}

function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}

const k = (sid, idx) => `${sid}__${idx}`;
const kApp = (sid, idx, field) => `${sid}__${idx}__${field}`;

// ─── STATS ───────────────────────────────────────────────────────────────────
function calcStats() {
  const total = SECTIONS.reduce((a,s) => a + s.items.length, 0);
  let checked=0, pass=0, flag=0, fail=0;
  Object.values(state.checks).forEach(v => {
    if (v) { checked++; if(v==='pass') pass++; else if(v==='flag') flag++; else if(v==='fail') fail++; }
  });
  return { total, checked, pass, flag, fail };
}

function sectionStats(sec) {
  let checked=0, pass=0, flag=0, fail=0;
  sec.items.forEach((_, idx) => {
    const v = state.checks[k(sec.id, idx)] || '';
    if (v) { checked++; if(v==='pass') pass++; else if(v==='flag') flag++; else if(v==='fail') fail++; }
  });
  return { total: sec.items.length, checked, pass, flag, fail };
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function inp(placeholder, value, onChange, type='text', extraClass='') {
  const i = document.createElement('input');
  i.type = type; i.placeholder = placeholder || ''; i.value = value || '';
  if (extraClass) i.className = extraClass;
  i.addEventListener('input', e => onChange(e.target.value));
  return i;
}

function textarea(placeholder, value, onChange, className='') {
  const t = document.createElement('textarea');
  t.placeholder = placeholder; t.value = value || '';
  if (className) t.className = className;
  t.addEventListener('input', e => onChange(e.target.value));
  return t;
}

function field(labelText, inputEl, fullWidth=false) {
  const d = el('div', { className: 'field' + (fullWidth ? ' field-full' : '') });
  d.appendChild(el('label', {}, labelText));
  d.appendChild(inputEl);
  return d;
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
let currentSection = 'property';

function showSection(id) {
  currentSection = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.section === id));
  renderContent();
  document.getElementById('content-scroll').scrollTop = 0;
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  // Keep the property info item (first child), rebuild the rest
  while (nav.children.length > 1) nav.removeChild(nav.lastChild);

  SECTIONS.forEach(sec => {
    const st = sectionStats(sec);
    const item = el('div', { className: 'nav-item', 'data-section': sec.id, onclick: () => showSection(sec.id) },
      el('span', { className: 'nav-icon' }, sec.icon),
      el('span', { className: 'nav-label' }, sec.label),
      el('span', { className: 'nav-count' }, `${st.checked}/${st.total}`),
    );
    const badges = el('div', { className: 'nav-badges' });
    if (st.fail > 0) badges.appendChild(el('span', { className: 'nav-badge fail' }, `✗${st.fail}`));
    if (st.flag > 0) badges.appendChild(el('span', { className: 'nav-badge flag' }, `⚠${st.flag}`));
    if (badges.children.length) item.appendChild(badges);
    nav.appendChild(item);
  });

  // Summary nav item
  const sumItem = el('div', { className: 'nav-item', 'data-section': 'summary', onclick: () => showSection('summary') },
    el('span', { className: 'nav-icon' }, '📊'),
    el('span', { className: 'nav-label' }, 'Summary'),
  );
  nav.appendChild(sumItem);

  // Re-mark active
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.section === currentSection));
}

function updateProgress() {
  const st = calcStats();
  const pct = st.total ? Math.round(st.checked / st.total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${st.checked} / ${st.total} reviewed`;
  document.getElementById('prog-pass').textContent = `✓ ${st.pass}`;
  document.getElementById('prog-flag').textContent = `⚠ ${st.flag}`;
  document.getElementById('prog-fail').textContent = `✗ ${st.fail}`;
}

// ─── SECTION HEADER ──────────────────────────────────────────────────────────
function updateSectionHeader(title, icon, sub, secId) {
  document.getElementById('hdr-icon').textContent = icon;
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-sub').textContent = sub || '';
  const badges = document.getElementById('hdr-badges');
  badges.innerHTML = '';
  if (secId) {
    const sec = SECTIONS.find(s => s.id === secId);
    if (sec) {
      const st = sectionStats(sec);
      if (st.fail > 0) badges.appendChild(el('span', { className: 'sec-badge fail' }, `✗ ${st.fail} failed`));
      if (st.flag > 0) badges.appendChild(el('span', { className: 'sec-badge flag' }, `⚠ ${st.flag} flagged`));
    }
  }
}

// ─── RENDER CONTENT ──────────────────────────────────────────────────────────
function renderContent() {
  const scroll = document.getElementById('content-scroll');
  scroll.innerHTML = '';

  if (currentSection === 'property') {
    updateSectionHeader('Property Information', '🏢', '');
    scroll.appendChild(renderPropertyPanel());
  } else if (currentSection === 'summary') {
    updateSectionHeader('Inspection Summary', '📊', '');
    scroll.appendChild(renderSummaryPanel());
  } else {
    const sec = SECTIONS.find(s => s.id === currentSection);
    if (sec) {
      const st = sectionStats(sec);
      updateSectionHeader(sec.label, sec.icon, `${st.checked} of ${st.total} reviewed`, sec.id);
      scroll.appendChild(renderChecklistPanel(sec));
    }
  }
}

// ─── PROPERTY PANEL ──────────────────────────────────────────────────────────
function renderPropertyPanel() {
  const panel = el('div', { id: 'prop-panel' });

  const card1 = el('div', { className: 'info-card' });
  card1.appendChild(el('div', { className: 'card-title' }, 'Property Details'));

  // Instructions card

    'Flagged or failed items auto-reveal a note field.',

    'Each section has a comment box for general observations.',
    'Your progress saves automatically to this device.',

// ─── CHECKLIST PANEL ─────────────────────────────────────────────────────────
function renderChecklistPanel(sec) {
  const panel = el('div', { id: 'check-panel' });

  sec.items.forEach((item, idx) => {
    const itemKey = k(sec.id, idx);
    const curVal = state.checks[itemKey] || '';
    const curNote = state.notes[itemKey] || '';

    const card = el('div', { className: `check-item status-${curVal}` });

    // Top row
    const top = el('div', { className: 'check-top' });

    // Label
    const labelWrap = el('div', { className: 'check-label' }, item.label);
    if (item.appliance) labelWrap.appendChild(el('span', { className: 'appliance-badge' }, 'Appliance'));
    top.appendChild(labelWrap);

    // Status buttons
    const btns = el('div', { className: 'status-btns' });
    [
      { key:'pass', label:'✓ Pass' },
      { key:'flag', label:'⚠ Flag' },
      { key:'fail', label:'✗ Fail' },
      { key:'na',   label:'N/A' },
    ].forEach(({ key, label }) => {
      const btn = el('button', {
        className: `status-btn${curVal === key ? ` active-${key}` : ''}`,
        onclick: () => {
          const newVal = state.checks[itemKey] === key ? '' : key;
          state.checks[itemKey] = newVal;
          saveState();
          buildNav(); updateProgress(); renderContent();
        }
      }, label);
      btns.appendChild(btn);
    });
    top.appendChild(btns);
    card.appendChild(top);

    // Appliance fields
    if (item.appliance) {
      const af = el('div', { className: 'appliance-fields' });
      af.appendChild(el('div', { className: 'appliance-fields-title' }, 'Equipment Details'));
      const grid = el('div', { className: 'appliance-fields-grid' });
      [
        { f:'Brand',    ph:'e.g. Lennox' },
        { f:'Model',    ph:'e.g. XC21-060' },
        { f:'Serial #', ph:'e.g. 5107A12345' },
      ].forEach(({ f, ph }) => {
        const aKey = kApp(sec.id, idx, f);
        const aInp = inp(ph, state.appliance[aKey] || '', v => { state.appliance[aKey]=v; saveState(); });
        grid.appendChild(field(f, aInp));
      });
      af.appendChild(grid);
      card.appendChild(af);
    }

    // Note field — shown when flagged/failed or note exists
    if (curVal === 'flag' || curVal === 'fail' || curNote) {
      const noteEl = textarea(
        'Note: repair needed, follow-up action, estimated cost...',
        curNote,
        v => { state.notes[itemKey]=v; saveState(); },
        'item-note'
      );
      noteEl.style.borderColor = curVal === 'fail' ? '#fca5a5' : curVal === 'flag' ? '#fcd34d' : 'var(--gray-200)';
      card.appendChild(noteEl);
    }

    panel.appendChild(card);
  });

  // Section comment box
  const commentBox = el('div', { className: 'section-comment-box' });
  const commentLabel = el('label', {}, '📝 ', 'Section Comments');
  commentBox.appendChild(commentLabel);
  commentBox.appendChild(textarea(
    `General observations or follow-up notes for ${sec.label}...`,
    state.sectionComments[sec.id] || '',
    v => { state.sectionComments[sec.id]=v; saveState(); }
  ));
  panel.appendChild(commentBox);

  return panel;
}

// ─── SUMMARY PANEL ───────────────────────────────────────────────────────────
function renderSummaryPanel() {
  const panel = el('div', { id: 'summary-panel' });
  const st = calcStats();

  // Stat cards
  const statsRow = el('div', { className: 'summary-stats' });
  [
    { cls:'s-total', val:st.total,   label:'Total' },
    { cls:'s-pass',  val:st.pass,    label:'Passed' },
    { cls:'s-flag',  val:st.flag,    label:'Flagged' },
    { cls:'s-fail',  val:st.fail,    label:'Failed' },
  ].forEach(({ cls, val, label }) => {
    const c = el('div', { className: `stat-card ${cls}` });
    c.appendChild(el('div', { className: 'stat-val' }, String(val)));
    c.appendChild(el('div', { className: 'stat-label' }, label));
    statsRow.appendChild(c);
  });
  panel.appendChild(statsRow);

  // Per-section rows
  const secCard = el('div', { className: 'info-card' });
  secCard.appendChild(el('div', { className: 'card-title' }, 'Section Breakdown'));
  SECTIONS.forEach(sec => {
    const ss = sectionStats(sec);
    const pct = ss.total ? Math.round(ss.checked / ss.total * 100) : 0;
    const row = el('div', { className: 'summary-section-row' });
    row.appendChild(el('span', { className: 'ssr-icon' }, sec.icon));
    row.appendChild(el('span', { className: 'ssr-label' }, sec.label));
    const prog = el('div', { className: 'ssr-prog' });
    const track = el('div', { className: 'ssr-bar-track' });
    const fill = el('div', { className: 'ssr-bar-fill', style: `width:${pct}%` });
    track.appendChild(fill);
    prog.appendChild(track);
    prog.appendChild(el('span', { className: 'ssr-count' }, `${ss.checked}/${ss.total}`));
    row.appendChild(prog);
    const badges = el('div', { className: 'ssr-badges' });
    if (ss.fail > 0) badges.appendChild(el('span', { className: 'nav-badge fail' }, `✗${ss.fail}`));
    if (ss.flag > 0) badges.appendChild(el('span', { className: 'nav-badge flag' }, `⚠${ss.flag}`));
    row.appendChild(badges);
    secCard.appendChild(row);
  });
  panel.appendChild(secCard);

  // Overall recommendation
  const recCard = el('div', { className: 'info-card' });
  recCard.appendChild(el('div', { className: 'card-title' }, 'Overall Recommendation'));
  recCard.appendChild(textarea(
    'Summarize overall condition, move-in timeline, deal-breakers, and owner commitments required before signing the management agreement...',
    state.summary,
    v => { state.summary=v; saveState(); }
  ));
  panel.appendChild(recCard);

  // Reset button
  const resetCard = el('div', { className: 'info-card', style: 'border-color:#fca5a5;' });
  resetCard.appendChild(el('div', { className: 'card-title', style: 'color:#b91c1c;' }, 'Reset Checklist'));
  resetCard.appendChild(el('p', { style: 'font-size:14px; color:var(--gray-600); margin-bottom:14px;' }, 'Clears all data and starts a fresh inspection. This cannot be undone.'));
  const resetBtn = el('button', {
    style: 'background:#fff; border:1.5px solid #fca5a5; color:#b91c1c; border-radius:10px; padding:12px 24px; font-family:Sora,sans-serif; font-size:13px; font-weight:700; cursor:pointer; min-height:48px;',
    onclick: () => {
      if (confirm('Reset all checklist data? This cannot be undone.')) {
        state = defaultState();
        localStorage.removeItem(STATE_KEY);
        showSection('property');
        buildNav(); updateProgress();
      }
    }
  }, '🗑 Reset All Data');
  resetCard.appendChild(resetBtn);
  panel.appendChild(resetCard);

  return panel;
}

// ─── PRINT ALL ───────────────────────────────────────────────────────────────
function printAll() {
  const st = calcStats();
  const p = state.prop;
  const pv = document.getElementById('print-view');

  const h = (tag, cls, ...children) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    children.forEach(c => {
      if (c == null) return;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  };
  const div = (cls, ...ch) => h('div', cls, ...ch);
  const span = (cls, txt) => h('span', cls, txt);

  pv.innerHTML = '';

  // Header
  const hdr = div('pv-header');
  const hdrL = div('pv-header-left');
  hdrL.appendChild(div('pv-co', 'Newera Property Management'));
  hdrL.appendChild(div('pv-title', 'Property Walkthrough Checklist'));
  hdr.appendChild(hdrL);
  const hdrR = div('pv-header-right');
  hdrR.innerHTML = `${p.date ? `<strong>Date:</strong> ${p.date}<br>` : ''}<strong>Inspector:</strong> ${p.inspector || '—'}`;
  hdr.appendChild(hdrR);
  pv.appendChild(hdr);

  // Property info grid
  const pg = div('pv-prop-grid');
  const propFields = [
    { label:'Address', val: p.address, full: true },
    { label:'Owner',   val: p.owner },
    { label:'Year Built', val: p.yearBuilt },
    { label:'Bedrooms', val: p.beds },
    { label:'Bathrooms', val: p.baths },
  ];
  propFields.forEach(f => {
    const fd = div('pv-prop-field' + (f.full ? ' pv-addr-full' : ''));
    fd.appendChild(h('label', null, f.label));
    fd.appendChild(div('pv-val', f.val || '—'));
    pg.appendChild(fd);
  });
  pv.appendChild(pg);

  // Summary stats bar
  const sumDiv = div('pv-summary');
  sumDiv.appendChild(div('pv-summary-title', 'Inspection Summary'));
  const statsRow = div('pv-summary-stats');
  [
    { cls:'s-total', val: st.total, label:'Total' },
    { cls:'s-pass',  val: st.pass,  label:'Passed' },
    { cls:'s-flag',  val: st.flag,  label:'Flagged' },
    { cls:'s-fail',  val: st.fail,  label:'Failed' },
  ].forEach(s => {
    const sc = div(`pv-stat ${s.cls}`);
    sc.appendChild(div('pv-stat-val', String(s.val)));
    sc.appendChild(div('pv-stat-label', s.label));
    statsRow.appendChild(sc);
  });
  sumDiv.appendChild(statsRow);
  if (state.summary) {
    sumDiv.appendChild(div('pv-rec-label', 'Overall Recommendation'));
    sumDiv.appendChild(div('pv-rec-text', state.summary));
  }
  pv.appendChild(sumDiv);

  // Each section
  SECTIONS.forEach(sec => {
    const secDiv = div('pv-section');
    const titleBar = div('pv-section-title');
    titleBar.appendChild(document.createTextNode(sec.icon + ' ' + sec.label));
    secDiv.appendChild(titleBar);

    const itemsDiv = div('pv-items');
    sec.items.forEach((item, idx) => {
      const val  = state.checks[k(sec.id, idx)] || '';
      const note = state.notes[k(sec.id, idx)] || '';
      const itemDiv = div(`pv-item${val ? ' pv-'+val : ''}`);

      const labelCol = div('pv-item-label', item.label);

      // Appliance details inline
      if (item.appliance) {
        const brand  = state.appliance[kApp(sec.id, idx, 'Brand')]    || '';
        const model  = state.appliance[kApp(sec.id, idx, 'Model')]    || '';
        const serial = state.appliance[kApp(sec.id, idx, 'Serial #')] || '';
        if (brand || model || serial) {
          const af = div('pv-app-fields');
          af.textContent = [brand && `Brand: ${brand}`, model && `Model: ${model}`, serial && `S/N: ${serial}`].filter(Boolean).join('  ·  ');
          labelCol.appendChild(af);
        }
      }

      // Note inline
      if (note) {
        const noteDiv = div('pv-item-note', `→ ${note}`);
        labelCol.appendChild(noteDiv);
      }

      itemDiv.appendChild(labelCol);

      const statusLabels = { pass:'✓ Pass', flag:'⚠ Flag', fail:'✗ Fail', na:'N/A', '':'—' };
      itemDiv.appendChild(span(`pv-status ${val || 'none'}`, statusLabels[val] || '—'));
      itemsDiv.appendChild(itemDiv);
    });

    // Section comment
    const secComment = state.sectionComments[sec.id] || '';
    if (secComment) {
      const sc = div('pv-sec-comment', `📝 ${secComment}`);
      itemsDiv.appendChild(sc);
    }

    secDiv.appendChild(itemsDiv);
    pv.appendChild(secDiv);
  });

  // Signature lines
  const sigDiv = div('pv-sig');
  ['Inspector Signature', 'Owner / Representative Signature', 'Print Name', 'Date'].forEach(lbl => {
    const sb = div('pv-sig-block');
    sb.appendChild(div('pv-sig-label', lbl));
    sigDiv.appendChild(sb);
  });
  pv.appendChild(sigDiv);

  // Print then clean up
  requestAnimationFrame(() => {
    window.print();
    setTimeout(() => { pv.innerHTML = ''; }, 1000);
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildNav();
updateProgress();
renderContent();
</script>
</body>
</html>
